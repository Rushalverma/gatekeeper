# =============================================================================
# Nginx Load Balancer — API Gateway SaaS
# Tested with nginx:1.27-alpine on Docker Compose --scale
# =============================================================================

worker_processes auto;

events {
    worker_connections 1024;
    multi_accept on;
}

http {

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr [$time_local] "$request" $status '
                    'upstream=$upstream_addr rt=${request_time}s';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/plain application/json application/javascript text/css;

    # ── Upstream — Node.js gateway cluster ────────────────────────────────────
    #
    # With docker compose --scale gateway=N, Docker's internal DNS ("gateway")
    # returns all N container IPs. Nginx round-robins across them.
    #
    # least_conn: route each request to the instance with fewest active connections.
    upstream gateway_cluster {
        least_conn;
        server gateway:3000;
        keepalive 32;
    }

    # ── Server ────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ── Proxy everything to the gateway cluster ──────────────────────────
        location / {
            proxy_pass         http://gateway_cluster;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";

            # Pass real client IP to Node.js rate limiter
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Host              $host;

            # Timeouts
            proxy_connect_timeout  5s;
            proxy_send_timeout    10s;
            proxy_read_timeout    30s;

            # Retry on next instance if current one fails
            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_tries 2;
        }

        # ── Custom 502/503/504 JSON error ────────────────────────────────────
        error_page 502 503 504 @gateway_down;
        location @gateway_down {
            default_type application/json;
            return 503 '{"error":"Gateway unavailable. All upstream instances are down.","status":503}';
        }
    }
}
